[tool:pytest]
testpaths = tests
norecursedirs = .git testing_config
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --disable-warnings
    --cov=custom_components.device_manager
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
markers =
    integration: Integration tests
    unit: Unit tests  
    slow: Slow running tests