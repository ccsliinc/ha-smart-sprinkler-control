[tool:pytest]
testpaths = tests
norecursedirs = .git testing_config
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --disable-warnings
    --cov=custom_components.smart_sprinkler_control
    --cov-report=term-missing
    --cov-report=html
    # Current floor. The existing tests exercise precipitation discovery/
    # timezone logic by importing the source file directly, so package-level
    # coverage is near zero today. Keep this at 0 so the suite is not blocked
    # on an aspirational target; raise it as real package coverage grows.
    --cov-fail-under=0
markers =
    integration: Integration tests
    unit: Unit tests
    slow: Slow running tests
