version: '3.8'

services:
  homeassistant:
    container_name: ha-sprinkler-dev
    image: homeassistant/home-assistant:latest
    volumes:
      # Mount custom component for live editing
      - ./custom_components:/config/custom_components
      # Mount dev config directory
      - ./dev-config:/config
    ports:
      - "8123:8123"
    environment:
      - TZ=America/New_York
    restart: unless-stopped
