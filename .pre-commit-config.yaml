repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        args:
          - --safe
          - --quiet
        language_version: python3
        files: ^((custom_components|tests)/.+)?[^/]+\.py$

  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        args:
          - --profile=black

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-docstrings==1.7.0
          - pydocstyle==6.3.0
        files: ^(custom_components|tests)/.+\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args:
          - --ignore-missing-imports
        files: ^custom_components/.+\.py$

  - repo: https://github.com/pycqa/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        args:
          - --configfile=pyproject.toml
          - --severity-level=medium
          - --confidence-level=medium
        files: ^custom_components/.+\.py$

  # TEMPORARILY DISABLED: pyupio/safety repo has broken .pre-commit-hooks.yaml
  # - repo: https://github.com/pyupio/safety
  #   rev: 3.2.9
  #   hooks:
  #     - id: safety
  #       args:
  #         - check
  #         - --json
  #         - --ignore=70612  # Known issue with Jinja2 that's not exploitable in HA context

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      # The vulture hook uses pass_filenames: false; scan paths and settings
      # (paths, exclude, min_confidence) come from [tool.vulture] in
      # pyproject.toml rather than CLI args.
      - id: vulture

  - repo: local
    hooks:
      - id: check-todo-comments
        name: Check for TODO comments in production code
        entry: bash
        language: system
        args:
          - -c
          - |
            if grep -r "TODO" custom_components/smart_sprinkler_control/ --include="*.py" --exclude-dir=tests --exclude-dir=scripts; then
              echo "❌ Found TODO comments in production code. Please create GitHub issues instead."
              exit 1
            fi
        pass_filenames: false

      - id: validate-manifest
        name: Validate manifest.json
        entry: python3
        language: system
        args:
          - -c
          - |
            import json
            with open('custom_components/smart_sprinkler_control/manifest.json') as f:
                manifest = json.load(f)
            required_keys = ['domain', 'name', 'version', 'codeowners', 'documentation', 'issue_tracker']
            missing = [k for k in required_keys if k not in manifest]
            if missing:
                print(f'❌ Missing required keys in manifest: {missing}')
                exit(1)
            print('✅ Manifest validation passed')
        pass_filenames: false
        files: custom_components/smart_sprinkler_control/manifest.json
